<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/gh/patriciogonzalezvivo/glslCanvas@master/dist/GlslCanvas.js"></script>
    <style>
        body { background: #111; display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
        canvas { width: 256px; height: 256px; }
    </style>
</head>
<body>
<script>
    fetch('/book-of-shaders')
        .then(r => r.json())
        .then(files => {
            files.forEach(file => {
                fetch(`/book-of-shaders/${file}`)
                    .then(r => r.text())
                    .then(source => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 256;
                        canvas.height = 256;
                        document.body.appendChild(canvas);
                        const sandbox = new GlslCanvas(canvas);
                        sandbox.load(source);
                    });
            });
        });
</script>
</body>
</html>
